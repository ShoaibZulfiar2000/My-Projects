<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramadan Grocery List</title>
    <!-- Bootstrap 5 CDN Link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4 text-success">🌙 Ramadan Grocery List</h2>

                        <!-- Bootstrap Input Group -->
                        <div class="input-group mb-4">
                            <input type="text" id="itemInput" class="form-control" placeholder="Enter item (e.g. Dates, Rooh Afza)" aria-label="Grocery Item">
                            <button class="btn btn-success" type="button" id="addBtn">Add Item</button>
                        </div>

                        <!-- Bootstrap List Group (Empty initially) -->
                        <ul id="groceryList" class="list-group">
                            <!-- JS will add <li> here -->
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://npmmirror.com"></script>

    <script>
        (function() {
            const input = document.getElementById('itemInput');
            const addBtn = document.getElementById('addBtn');
            const list = document.getElementById('groceryList');

            addBtn.addEventListener('click', function() {
                const itemValue = input.value.trim();

                if (itemValue !== "") {
                    // 1. Physically create the <li> element
                    const newLi = document.createElement('li');

                    // 2. Apply Bootstrap List Group class
                    newLi.className = "list-group-item d-flex justify-content-between align-items-center";
                    
                    // 3. Set text content
                    newLi.textContent = itemValue;

                    // 4. Attach (appendChild) to the <ul>
                    list.appendChild(newLi);

                    // 5. Clear input field after adding
                    input.value = "";
                    input.focus();
                } else {
                    alert("Please type something first!");
                }
            });

            // Allow adding item by pressing 'Enter' key
            input.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    addBtn.click();
                }
            });
        })();
    </script>
</body>
</html>
