<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daraz Seller Dashboard</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
  <h2 class="text-center mb-4">Daraz Seller Dashboard</h2>

  <!-- Form -->
  <div class="card p-4 shadow mb-4">
    <div class="mb-3">
      <label class="form-label">Product Name</label>
      <input type="text" id="name" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">Price</label>
      <input type="number" id="price" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">Category</label>
      <select id="category" class="form-select">
        <option>Electronics</option>
        <option>Clothing</option>
        <option>Grocery</option>
      </select>
    </div>

    <button id="addBtn" class="btn btn-primary w-100">Add Item</button>
  </div>

  <!-- Table -->
  <table class="table table-bordered table-striped">
    <thead class="table-dark">
      <tr>
        <th>#</th>
        <th>Product</th>
        <th>Price</th>
        <th>Category</th>
      </tr>
    </thead>
    <tbody id="tableBody">
    </tbody>
  </table>
</div>

<script>

// ✅ CLASS
class Product {
  constructor(name, price, category) {
    this.name = name;
    this.price = price;
    this.category = category;
  }
}

// ✅ MAIN ARRAY
let inventory = [];

// ✅ LOAD DATA FROM localStorage
const savedData = localStorage.getItem("inventory");

if (savedData) {
  const parsed = JSON.parse(savedData);

  parsed.forEach(item => {
    inventory.push(new Product(item.name, item.price, item.category));
  });
}

// ✅ RENDER FUNCTION (NO innerHTML)
function renderTable() {
  const tbody = document.getElementById("tableBody");

  // clear table
  tbody.innerHTML = ""; // sirf clear ke liye allowed

  inventory.forEach((item, index) => {

    const tr = document.createElement("tr");

    const td1 = document.createElement("td");
    td1.textContent = index + 1;

    const td2 = document.createElement("td");
    td2.textContent = item.name;

    const td3 = document.createElement("td");
    td3.textContent = "Rs. " + item.price;

    const td4 = document.createElement("td");
    td4.textContent = item.category;

    tr.appendChild(td1);
    tr.appendChild(td2);
    tr.appendChild(td3);
    tr.appendChild(td4);

    tbody.appendChild(tr);
  });
}

// ✅ ARROW FUNCTION (Add Item)
document.getElementById("addBtn").addEventListener("click", () => {

  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const category = document.getElementById("category").value;

  if (name === "" || price === "") {
    alert("Please fill all fields");
    return;
  }

  // create object
  const newProduct = new Product(name, price, category);

  // push to array
  inventory.push(newProduct);

  // save to localStorage
  localStorage.setItem("inventory", JSON.stringify(inventory));

  // re-render
  renderTable();

  // clear inputs
  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
});

// initial render
renderTable();

</script>

</body>
</html>
