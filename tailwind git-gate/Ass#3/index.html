<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Sign In</title>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <!-- Main Card Container -->
    <main class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        
        <!-- Header Text Section -->
        <div class="text-center mb-8">
            <p class="text-2xl font-bold text-gray-800">Sign in</p>
            <p class="text-gray-500 mt-2">Use Your Corvit Account</p>
        </div>  

        <!-- Form Section -->
        <div>
            <form action="" class="flex flex-col gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                    <input type="text" name="user-name" placeholder="Full Name" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" name="paswrd" placeholder="Password" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>

                <!-- Button Section -->
                <div class="mt-4">
                    <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-md transition duration-200">
                        Sign-in
                    </button>
                </div>
            </form>
        </div>
        
    </main>
</body>
</html>
