<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Quetta Chai</title>
</head>
<body class="bg-gray-100">

    <!-- Hero Section -->
    <header class="h-[70vh] flex flex-col justify-center items-center text-white text-center bg-cover bg-center"
        style="background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://bhojmasale.com/cdn/shop/articles/chai-paratha-recipe-874864_1024x1024.jpg?v=1739152988');">
        
        <h1 class="text-4xl font-bold">Quetta Chai</h1>
        <p class="mt-2 text-lg">Best Chai in Town</p>
    </header>

    <!-- Navbar -->
    <nav class="bg-yellow-600 py-4">
        <ul class="flex justify-center gap-6 text-white font-semibold">
            <li class="cursor-pointer hover:text-gray-200">Home</li>
            <li class="cursor-pointer hover:text-gray-200">Menu</li>
            <li class="cursor-pointer hover:text-gray-200">Contact Us</li>
        </ul>
    </nav>

    <main>

        <!-- Image Section -->
        <section class="flex flex-wrap justify-center gap-5 p-10 bg-gray-100">
            <img src="img (2).png" class="w-[250px] h-[200px] object-cover rounded-lg shadow-md">
            <img src="img (3).png" class="w-[250px] h-[200px] object-cover rounded-lg shadow-md">
            <img src="img (4).png" class="w-[250px] h-[200px] object-cover rounded-lg shadow-md">
            <img src="img (5).png" class="w-[250px] h-[200px] object-cover rounded-lg shadow-md">
        </section>

        <!-- Menu Section -->
        <section class="text-center p-10 bg-white">
            <h2 class="text-2xl font-bold mb-4">Select Your Order</h2>

            <select id="menuSelect" class="border p-2 rounded-md">
                <option>Chai - Rs. 50</option>
                <option>Special Chai - Rs. 80</option>
                <option>Paratha - Rs. 60</option>
            </select>

            <div class="mt-4 space-x-3">
                <button onclick="addorder()" class="bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-700">
                    Add Order
                </button>

                <button onclick="removeorder()" class="bg-red-600 text-white px-4 py-2 rounded-md hover:bg-red-700">
                    Remove Order
                </button>
            </div>

            <!-- Order List -->
            <ul id="orderList" class="mt-6 space-y-2"></ul>
        </section>

    </main>

    

</body>
</html>
