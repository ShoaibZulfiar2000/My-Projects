<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lahore Qalandars Playing 11</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <!-- Header -->
    <header class="bg-green-600 text-white text-center py-16 mb-8">
        <h1 class="text-4xl font-bold">Lahore Qalandars Playing 11</h1>
        <p class="text-lg mt-2">PSL 2026 Edition</p>
    </header>

    <!-- Players Grid -->
    <div class="max-w-6xl mx-auto px-4 mb-10">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">

            <!-- Player 1 -->
            <div class="bg-white rounded-lg shadow hover:-translate-y-2 transition transform">
                
                <div class="relative">
                    <span class="absolute top-3 left-3 bg-red-500 text-white text-xs px-3 py-1 rounded shadow">
                        Captain
                    </span>
                    <img src="/pl1.PNG" class="w-full h-[300px] object-cover rounded-t-lg">
                </div>

                <div class="text-center p-4">
                    <h5 class="font-bold text-lg">Shaheen Afridi</h5>
                    <p class="text-gray-500">Bowler</p>
                </div>
            </div>

            <!-- Player 2 -->
            <div class="bg-white rounded-lg shadow hover:-translate-y-2 transition transform">
                
                <div class="relative">
                    <span class="absolute top-3 left-3 bg-blue-500 text-white text-xs px-3 py-1 rounded shadow">
                        Foreign
                    </span>
                    <img src="/p2.PNG" class="w-full h-[300px] object-cover rounded-t-lg">
                </div>

                <div class="text-center p-4">
                    <h5 class="font-bold text-lg">Rashid Khan</h5>
                    <p class="text-gray-500">All-Rounder</p>
                </div>
            </div>

            <!-- Player 3 -->
            <div class="bg-white rounded-lg shadow hover:-translate-y-2 transition transform">
                
                <div class="relative">
                    <span class="absolute top-3 left-3 bg-yellow-400 text-black text-xs px-3 py-1 rounded shadow">
                        Wicket Keeper
                    </span>
                    <img src="/p3.PNG" class="w-full h-[300px] object-cover rounded-t-lg">
                </div>

                <div class="text-center p-4">
                    <h5 class="font-bold text-lg">Shai Hope</h5>
                    <p class="text-gray-500">Batsman</p>
                </div>
            </div>

            <!-- Repeat more players same structure -->

        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-4 bg-gray-900 text-white">
        <p>&copy; 2026 Lahore Qalandars Fan Page</p>
    </footer>

</body>
</html>
