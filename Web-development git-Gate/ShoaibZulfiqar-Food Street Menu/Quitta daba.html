<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        .hero-header {
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
             url("header-img.png");
            background-size: cover;
            background-position: center;
            height: 70vh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .nav {
            background-color: rgb(128, 88, 29); 
            padding: 15px;
        }

        .nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .nav li { color: white; cursor: pointer; }

        /* CONCEPT: The Flexbox Container */
        .Home-Container {
            display: flex;
            flex-wrap: nowrap;       
            overflow: auto;
            scrollbar-width: thin;
            justify-content: center; 
            gap: 20px;             
            padding: 40px;
            padding-bottom: 50px;
            background-color: #f4f4f4;
        }

        /* CONCEPT: Image Size Control */
        .Home-Container img {
            flex-basis: 250px;     /* Ideal width for each image */
            flex-shrink: 0;
            width: 250px;
            height: 200px;
            object-fit: cover;     /* Image stretch nahi hogi */
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        section { width: 100%; padding: 40px; text-align: center; }
        .price { color: red; font-weight: bold; }
    </style>
    <title>Food Street</title>
</head>
<body>

    <header class="hero-header">
        <h1>Food Street</h1>
        <p>Best Food in Town</p>
    </header>

    <nav class="nav">
        <ul>
            <li>Home</li>
            <li>Menu</li>
            <li>Contact Us</li>
        </ul>
    </nav>

    <main>
        <!-- CORRECTED: Yahan <Home> tag ghalat tha, hum ne section use kiya -->
        <section class="Home-Container">
            <img src="karahi.png" alt="karahi">
            <img src="biryani.png" alt="biryani">
            <img src="kabab.png" alt="Kabab">
            <img src="img (3).png" alt="Allu wala paratha">
            <img src="img (4).png" alt="paratha">
            <img src="img (5).png" alt="paratha">
        </section>

        <section id="Menu">
            <h2>Select Your Order</h2>
            <br>
            <select>
                <option>Biryani -Full/ Rs. 600</option>
                <option>Karahi -Full/ Rs. 1200</option>
                <option>Seekh Kabab -Full/ Rs. 120</option>
                <option>Chai - Rs. 50</option>
                <option>Special Chai - Rs. 80</option>
                <option>Paratha - Rs. 60</option>
                
            </select> 
            <div>
            <button onclick="addorder()">AddOrder</button>
            <button onclick="removeorder()">Remove Order</button>
            <p id="displayorder"></p>
            </div>  
        </section>
        
    </main>
<script>
let count = 0;
let displayorder= document.getElementById("displayorder");
function addorder()
{
         count++;
         displayorder.innerText="";
         updatedisplay();
            }
function removeorder()
{
    if (count===0){
        displayorder.innerText="Not order Select";
        updatedisplay();
    }
    else{
        count--;
        updatedisplay();
        
    }
    // 4. Update Display Function (Jo aap likhna bhool gaye thay)
    function updatedisplay() {
        displayorder.innerText = "Your total orders: " + count;
    }
        }

</body>
</html>
